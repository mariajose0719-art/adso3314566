    <header>
        <h1>16-semantic</h1>
        <h2>Defines layout with semantic tags (new style).</h2>

    <section>
<style>
    body{
        background-color: #1e1e1e;
        font-family: Arial, sans-serif;
    }

    table{
        width: 600px;
        margin: 50px auto;
        border-collapse: collapse;
    }

    td{
        border: 5px solid #cfcfcf;
        background-color: #5a5a5a;
        color: white;
        text-align: center;
        padding: 20px;
    }

    .header{ height: 50px; }
    .nav{ height: 50px; }
    .footer{ height: 50px; }

    .article{
        width: 70%;
        height: 150px;
    }

    .aside{
        width: 30%;
    }

    .section{
        background-color: #3a3a3a;
        margin-top: 10px;
        padding: 20px;
    }
</style>
</head>

<body>
                <a href="../02-html/index.html" class="btn-home">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">

                        d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
                    </path>
                </svg> </a>

<table>

    <tr>
        <td colspan="2" class="header">
            &lt;header&gt;
        </td>
    </tr>

    <tr>
        <td colspan="2" class="nav">
            &lt;nav&gt;
        </td>
    </tr>

    <tr>
        <td class="article">
            &lt;article&gt;

            <div class="section">
                &lt;section&gt;
            </div>

        </td>

        <td class="aside">
            &lt;aside&gt;
        </td>
    </tr>

    <tr>
        <td colspan="2" class="footer">
            &lt;footer&gt;
        </td>
    </tr>

</table>

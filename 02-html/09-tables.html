            <h2>Creates tables for data display.</h2>

        <section>
    <style>
        body{
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
        }

        .btn-home{
            position: absolute;
            top: 20px;
            left: 20px;
        }

        table{
            width: 60%;
            margin: 80px auto;
            border-collapse: collapse;
            text-align: center;
        }

        th{
            background-color: #E44D26;
            padding: 12px;
        }

        td{
            padding: 10px;
        }

        tr:nth-child(even){
            background-color: #2a2a2a93;
        }

        tr:nth-child(odd){
            background-color: #3a3a3a8f;
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15-positions</title>

    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>

        section {
            margin-bottom: 4rem;
            padding: 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 1rem;
        }

        section h3 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            border-left: 4px solid #a855f7;
            /* Eliminé cualquier borde inferior */
            border-bottom: none;
        }

        div.container {
            position: relative;
            width: 350px;
            height: 180px;
            border: 4px solid white;
            background-color: rgba(255,255,255,0.1);
            padding: 1rem;
            margin: 0 auto;
            /* Espacio extra arriba para separar del título */
            margin-top: 1rem;
        }

        div.box {
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        /* STATIC */
        div.static {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            position: static;
        }

        /* RELATIVE */
        div.relative {
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
            position: relative;
            top: 20px;
            left: 30px;
        }

        /* ABSOLUTE */
        div.absolute {
            background: linear-gradient(135deg, #ea580c, #9a3412);
            position: absolute;
            top: 20px;
            right: 20px;
        }

        /* FIXED */
        div.fixed {
            background: linear-gradient(135deg, #059669, #064e3b);
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            z-index: 100;
        }

        /* STICKY */
        div.sticky {
            background: linear-gradient(135deg, #7c3aed, #4c1d95);
            position: sticky;
            top: 10px;
        }

        .sticky-container {
            overflow: auto;
            height: 200px;
        }

        .space {
            height: 150px;
        }

        .fixed-note {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }

        /* Títulos del header no afectan */
        header h1, header h2 {
            margin-bottom: 1rem;
        }

    </style>
</head>

<body>

    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg"
             width="32"
             height="32"
             fill="white"
             viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,
                58.34a8,8,0,0,1-11.32,11.32l-72-72a8,
                8,0,0,1,0-11.32l72-72a8,8,0,0,1,
                11.32,11.32L59.31,120H216A8,8,0,0,1,
                224,128Z">
            </path>
        </svg>
    </a>

    <main>

        <header>
            <h1>15-positions</h1>
            <h2>
                CSS position property specifies how an element is positioned.
            </h2>
        </header>

        <section>
            <h3>Static:</h3>
            <div class="container">
                <div class="box static">
                    STATIC
                </div>
            </div>
        </section>

        <section>
            <h3>Relative:</h3>
            <div class="container">
                <div class="box relative">
                    RELATIVE
                </div>
            </div>
        </section>

        <section>
            <h3>Absolute:</h3>
            <div class="container">
                <div class="box static" style="opacity: 0.4;">
                    STATIC
                </div>
                <div class="box absolute">
                    ABSOLUTE
                </div>
            </div>
        </section>

        <section>
            <h3>Sticky:</h3>
            <div class="container sticky-container">
                <div class="box sticky">
                    STICKY
                </div>
                <div class="space"></div>
            </div>
        </section>

        <section>
            <h3>Fixed:</h3>
            <div class="container">
                <div class="box static" style="opacity: 0.4;">
                    STATIC
                </div>
                <div class="box fixed">
                    FIXED
                </div>
            </div>
            <div class="fixed-note">
                El elemento Fixed se posiciona fijo respecto a la ventana del navegador (esquina inferior izquierda)
            </div>
        </section>

    </main>

</body>
</html>

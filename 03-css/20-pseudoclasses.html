<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20-pseudoclasses</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
<style>

    /* SECCION INDIVIDUAL PARA CADA PSEUDOCLASE */
    .pseudo-card {
        width: 700px;
        margin: 2rem auto;
        border: 4px solid #9b59b6;
        padding: 2rem;
        background-color: rgba(155, 89, 182, 0.1);
        border-radius: 1rem;
    }

    .pseudo-card h3 {
        margin-bottom: 1rem;
        color: #d7bde2;
    }

    /* HOVER */
    button.hover-btn {
        background-color: #8e44ad;
        color: white;
        border: none;
        padding: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    button.hover-btn:hover {
        background-color: #6c3483;
        transform: scale(1.05);
    }

    /* ACTIVE */
    button.active-btn {
        background-color: #9b59b6;
        color: white;
        border: none;
        padding: 1rem;
        cursor: pointer;
    }

    button.active-btn:active {
        background-color: #d2b4de;
    }

    /* FOCUS */
    input.focus-input {
        padding: 1rem;
        border: 3px solid #9b59b6;
        outline: none;
        width: 100%;
    }

    input.focus-input:focus {
        border-color: #d2b4de;
        background-color: #4a235a;
        color: white;
    }

    /* FIRST-CHILD */
    .first-list li:first-child {
        color: #d7bde2;
        font-weight: bold;
    }

    /* LAST-CHILD */
    .last-list li:last-child {
        color: #bb8fce;
        font-style: italic;
    }

    /* NTH-CHILD */
    .nth-list li:nth-child(2) {
        color: #af7ac5;
        font-size: 1.2rem;
    }

    /* LINK / VISITED */
    a.demo-link:link {
        color: #d7bde2;
    }

    a.demo-link:visited {
        color: #f4ecf7;
    }

    ul, ol {
        padding-left: 1.5rem;
    }

    li {
        margin: 0.5rem 0;
    }

</style>

</head>

<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg> 
    </a>
    <main>
        <header>
            <h1>20 - Pseudoclasses</h1>
            <h2>Is used to define a special state of an element.</h2>
        </header>

        <!-- SECCION 1: HOVER -->
        <div class="pseudo-card">
            <h3>:hover</h3>
            <button class="hover-btn">Hover Me</button>
        </div>

        <!-- SECCION 2: ACTIVE -->
        <div class="pseudo-card">
            <h3>:active</h3>
            <button class="active-btn">Click Me</button>
        </div>

        <!-- SECCION 3: FOCUS -->
        <div class="pseudo-card">
            <h3>:focus</h3>
            <input type="text" class="focus-input" placeholder="Click here">
        </div>

        <!-- SECCION 4: FIRST-CHILD -->
        <div class="pseudo-card">
            <h3>:first-child</h3>
            <ul class="first-list">
                <li>First Item</li>
                <li>Second Item</li>
                <li>Third Item</li>
            </ul>
        </div>

        <!-- SECCION 5: LAST-CHILD -->
        <div class="pseudo-card">
            <h3>:last-child</h3>
            <ul class="last-list">
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ul>
        </div>

        <!-- SECCION 6: NTH-CHILD -->
        <div class="pseudo-card">
            <h3>:nth-child()</h3>
            <ol class="nth-list">
                <li>Item One</li>
                <li>Item Two</li>
                <li>Item Three</li>
            </ol>
        </div>

        <!-- SECCION 7: LINK / VISITED -->
        <div class="pseudo-card">
            <h3>:link / :visited</h3>
            <a href="https://www.google.com" target="_blank" class="demo-link">Visit Google</a>
        </div>

    </main>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid con Imágenes</title>

<link rel="stylesheet" href="../src/css/03-css.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.grid{
    width:650px;
    height:650px;

    display:grid;

    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);

    gap:4px;
}

.box{
    overflow:hidden;
}

/* Imagen grande vertical */
.box2{
    grid-column:2;
    grid-row:1 / 3;
}

/* Imagen grande horizontal */
.box6{
    grid-column:1 / 3;
    grid-row:3;
}

.box img{
    width:100%;
    height:100%;
    display:block;

    object-fit:cover;

    transition:.3s;
}

.box img:hover{
    transform:scale(1.08);
}

</style>

</head>
<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>
<body>

<div class="grid">

    <div class="box">
        <img src="../chepe.jpg" alt="">
    </div>

    <div class="box box2">
        <img src="../chepe.jpg" alt="">
    </div>

    <div class="box">
        <img src="../chepe.jpg" alt="">
    </div>

    <div class="box">
        <img src="../chepe.jpg" alt="">
    </div>

    <div class="box">
        <img src="../chepe.jpg" alt="">
    </div>

    <div class="box box6">
        <img src="../chepe.jpg" alt="">
    </div>

    <div class="box">
        <img src="../chepe.jpg" alt="">
    </div>

</div>

</body>
</html>

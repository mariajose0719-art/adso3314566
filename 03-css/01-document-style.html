<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>27 box shadow</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        body {
            background: #777777;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            margin-top: 30px;
            color: #ffffff;
        }

        h2 {
            color: #ffd700;
            font-weight: normal;
        }

        h3 {
            margin: 30px 0 10px 0;
            color: #ffffff;
            text-align: center;
        }

        section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .box {
            width: 200px;
            height: 200px;
            background: #b341ff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            margin: 20px auto;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .box1 {
            box-shadow: 0 0 12px #fff;
        }

        .box2 {
            box-shadow: -10px -10px 24px 0 #fff;
        }

        .box3 {
            box-shadow: 0 0 20px #fff inset;
        }

        .box4 {
            box-shadow: 4px 4px 0 4px #cc0, 8px 8px 0 6px #00c, 12px 12px 0 8px #c00;
        }

        .images {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .images img {
            width: 180px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .images img:first-child {
            box-shadow: 0 0 12px #fff;
        }

        .images img:last-child {
            filter: drop-shadow(0 0 12px #fff);
        }

        /* ANIMACIONES NEÓN AL HOVER */
        .box1:hover {
            box-shadow: 0 0 20px #fff, 0 0 40px #fff, 0 0 60px rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
            animation: pulseWhite 0.8s ease-in-out infinite alternate;
        }

        .box2:hover {
            box-shadow: -15px -15px 30px 0 #0ff, -5px -5px 20px 0 #0ff;
            transform: scale(1.05) rotate(-2deg);
            background: linear-gradient(135deg, #00ccff, #0099ff);
        }

        .box3:hover {
            box-shadow: 0 0 20px #ff44ff inset, 0 0 30px #ff44ff;
            transform: scale(1.05);
            background: linear-gradient(135deg, #ff44ff, #cc00ff);
        }

        .box4:hover {
            box-shadow: 6px 6px 0 6px #ff0, 12px 12px 0 8px #0ff, 18px 18px 0 10px #f0f;
            transform: translateY(-5px) scale(1.03);
        }

        .images img:first-child:hover {
            box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            transform: scale(1.08) rotate(3deg);
        }

        .images img:last-child:hover {
            filter: drop-shadow(0 0 20px #00ff88) drop-shadow(0 0 40px #00ff88);
            transform: scale(1.08) rotate(-3deg);
        }

        /* Botón home */
        .btn-home {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: 100;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-home:hover {
            transform: scale(1.1);
            background: rgba(179, 65, 255, 0.5);
            box-shadow: 0 0 20px #b341ff;
        }

        @keyframes pulseWhite {
            0% {
                box-shadow: 0 0 10px #fff, 0 0 20px #fff;
                transform: scale(1.03);
            }

            100% {
                box-shadow: 0 0 30px #fff, 0 0 50px #fff;
                transform: scale(1.08);
            }
        }
    </style>
</head>

<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>

    <main>
        <header>
            <h1>27 box shadow</h1>
            <h2>Property attaches one or more shadows to an element.</h2>
        </header>

        <section>
            <h3>box-shadow: 0 0 12px #fff</h3>
            <div class="box box1"></div>

            <h3>box-shadow: -10px -10px 24px 0 #fff</h3>
            <div class="box box2"></div>

            <h3>box-shadow: 0 0 20px #fff inset</h3>
            <div class="box box3"></div>

            <h3>box-shadow: multiple</h3>
            <div class="box box4"></div>

            <h3>box-shadow VS drop-shadow()</h3>
            <div class="images">
                <img src="/03-css/imgs/homer.jpg" width="180" alt="homer">
                <img src="/03-css/imgs/homer.jpg" width="180" alt="homer">
            </div>
        </section>
    </main>
</body>

</html>

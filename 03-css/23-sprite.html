<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23-Sprite</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        /* SECCIÓN 1 - RUNNER */
        .section-runner {
            margin-bottom: 2rem;
        }

        div#sprite{
            background: url(../src/imgs/anim-sprite.png) no-repeat;
            height: 256px;
            margin: 1rem auto;
            width: 256px;
        }
        div#sprite.sp1 { background-position: calc(-256px * 0) 0;}
        div#sprite.sp2 { background-position: calc(-256px * 1) 0;}
        div#sprite.sp3 { background-position: calc(-256px * 2) 0;}
        div#sprite.sp4 { background-position: calc(-256px * 3) 0;}
        div#sprite.sp5 { background-position: calc(-256px * 4) 0;}
        div#sprite.sp6 { background-position: calc(-256px * 5) 0;}

        /* SECCIÓN 2 - MARIO */
        .section-mario {
            margin-top: 2rem;
        }

        div#mario{
            background: url(../src/imgs/steps-01.png) no-repeat;
            height: 256px;
            margin: 1rem auto;
            width: 250px;
        }
        div#mario.m1 { background-position: calc(-256px * 0) 0;}
        div#mario.m2 { background-position: calc(-256px * 1) 0;}
        div#mario.m3 { background-position: calc(-256px * 2) 0;}
        div#mario.m4 { background-position: calc(-256px * 3) 0;}
        div#mario.m5 { background-position: calc(-256px * 4) 0;}
        div#mario.m6 { background-position: calc(-256px * 5) 0;}
    </style>
</head>
<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg> </a>
    <main>
        <header>
            <h1>23 Sprite</h1>
            <h2>An image sprite is a collection of images put into a single image.</h2>
        </header>
        
        <!-- SECCIÓN 1: RUNNER -->
        <section class="section-runner">
            <h3>Runner</h3>
            <div id="sprite" class="sp1"></div>
        </section>

        <!-- SECCIÓN 2: MARIO -->
        <section class="section-mario">
            <h3>Mario</h3>
            <div id="mario" class="m1"></div>
        </section>
    </main>
    <script>
        const sprite = document.getElementById('sprite')
        const numSprite = 6
        let count = 1
        setInterval(() => {
            sprite.className = ''
            sprite.classList.add('sp'+count)
            if(count == numSprite) count=1
            else count++
        }, 80)
    </script>
    <script>
        const mario = document.getElementById('mario')
        const numMario = 6
        let counter = 1
        setInterval(() => {
            mario.className = ''
            mario.classList.add('m'+counter)
            if(counter == numMario) counter=1
            else counter++
        }, 150)
    </script>
</body>
</html>

    <style>
        .chessboard {
            width: 400px;
            height: 400px;
            border: 5px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin: 0 auto;
        }

        .row {
            display: flex;
            height: 12.5%;
        }

        .cell {
            width: 12.5%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* EFECTO BRILLO TIPO MONEDA PLATEADA - LINEAS DENTRO */
        .cell::before {
            content: '';
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: linear-gradient(
                115deg,
                transparent 0%,
                transparent 35%,
                rgba(255,255,255,0.3) 40%,
                rgba(255,255,255,0.6) 45%,
                rgba(255,255,255,0.8) 50%,
                rgba(255,255,255,0.6) 55%,
                rgba(255,255,255,0.3) 60%,
                transparent 65%,
                transparent 100%
            );
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            transform: rotate(25deg);
        }

        .cell:hover::before {
            opacity: 1;
            animation: coinShine 0.6s ease forwards;
        }

        .cell:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 0 15px rgba(192,192,192,0.7);
        }

        @keyframes coinShine {
            0% {
                transform: rotate(25deg) translateX(-30%) translateY(-30%);
            }
            100% {
                transform: rotate(25deg) translateX(30%) translateY(30%);
            }
        }

        /* PIEZAS DE AJEDREZ ANIMADAS */
        .cell .piece {
            animation: float 2s ease-in-out infinite;
            display: inline-block;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cell:hover .piece {
            animation: bounce 0.5s ease;
            transform: scale(1.15);
            filter: drop-shadow(0 0 5px rgba(192,192,192,0.8));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        section {
            display: flex;
            justify-content: center;
            padding: 2rem;
        }
    </style>
</head>

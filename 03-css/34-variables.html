<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>34-variables</title>
    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>
        :root {
            --color-main: #4c1d95;
            --color-bg: #1a0b2e;
            --color-text: #f3e8ff;
        }

        section {
            text-align: center;
            padding: 2rem;
            background: var(--color-bg);
            border: 4px solid var(--color-main);
            border-radius: 12px;
            margin: 2rem auto;
            max-width: 400px;
        }

        h3 {
            color: var(--color-main);
        }

        p {
            color: var(--color-text);
            background: var(--color-main);
            padding: 1rem;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>

    <main>
        <header>
            <h1>34-variables</h1>
            <h2>The var() function is used to insert the value of a CSS variable</h2>
        </header>

        <section>
            <h3>Variable en borde y texto</h3>
            <p>Este párrafo usa --color-main para fondo y --color-text para texto.</p>
        </section>
    </main>
</body>

</html>

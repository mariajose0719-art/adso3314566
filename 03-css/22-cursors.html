<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>22-cursors</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>

        /* Contenedor principal (USA DIV en lugar de SECTION para evitar estilos globales) */
        .cursors-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-top: 3rem;
        }

        /* Cada cuadro individual (USA SECTION con clase específica) */
        .cursor-box {
            width: 250px;
            height: 120px;

            border: 3px solid #9b59b6;
            border-radius: 12px;
            padding: 1rem;

            background: linear-gradient(135deg, rgba(155, 89, 182, 0.2), rgba(155, 89, 182, 0.05));

            display: flex;
            justify-content: center;
            align-items: center;

            transition: all 0.3s ease;
        }

        /* ESTILO DEL TEXTO DENTRO DE CADA CUADRO */
        .cursor-box span {
            color: #d7bde2;
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            font-family: monospace;
        }

        /* HOVER EN CADA CUADRO */
        .cursor-box:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.4), rgba(155, 89, 182, 0.2));
            border-color: #bb8fce;
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.5);
        }

        /* ===================== */
        /* CURSORS */
        /* ===================== */

        .pointer {
            cursor: pointer;
        }

        .wait {
            cursor: wait;
        }

        .crosshair {
            cursor: crosshair;
        }

        .move {
            cursor: move;
        }

        .text {
            cursor: text;
        }

        .help {
            cursor: help;
        }

        .not-allowed {
            cursor: not-allowed;
        }

        .grab {
            cursor: grab;
        }

    </style>

</head>

<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>
    <main>
        <header>
            <h1>22 - Cursors</h1>
            <h2>Specifies the mouse cursor to be displayed when pointing over an element.</h2>
        </header>

        <!-- CONTENEDOR PRINCIPAL (USO DIV para evitar el estilo global de SECTION) -->
        <div class="cursors-container">

            <!-- POINTER -->
            <div class="cursor-box pointer">
                <span>cursor: pointer</span>
            </div>

            <!-- WAIT -->
            <div class="cursor-box wait">
                <span>cursor: wait</span>
            </div>

            <!-- CROSSHAIR -->
            <div class="cursor-box crosshair">
                <span>cursor: crosshair</span>
            </div>

            <!-- MOVE -->
            <div class="cursor-box move">
                <span>cursor: move</span>
            </div>

            <!-- TEXT -->
            <div class="cursor-box text">
                <span>cursor: text</span>
            </div>

            <!-- HELP -->
            <div class="cursor-box help">
                <span>cursor: help</span>
            </div>

            <!-- NOT-ALLOWED -->
            <div class="cursor-box not-allowed">
                <span>cursor: not-allowed</span>
            </div>

            <!-- GRAB -->
            <div class="cursor-box grab">
                <span>cursor: grab</span>
            </div>

        </div>

    </main>
</body>

</html>
